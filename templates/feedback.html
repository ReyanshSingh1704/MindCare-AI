<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Feedback | MindCare AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<!-- Navbar -->

<nav class="custom-navbar">

    <div class="logo">

        🧠 <span>MindCare AI</span>

    </div>

    <div class="nav-links">

        <a href="/">Home</a>

        <a href="/dashboard">Dashboard</a>

        <a href="/history">History</a>

        <a href="/about">About</a>

    </div>

</nav>

<!-- Hero -->

<section class="hero">

    <h1>Feedback</h1>

    <p>

        We'd love to hear your thoughts about MindCare AI.

    </p>

</section>

<!-- Form -->

<div class="container">

    <div class="card">

        <h2 class="mb-4">

            ⭐ Share Your Feedback

        </h2>

        <form action="/submit_feedback" method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Your Name

                </label>

                <input
                    type="text"
                    name="name"
                    class="form-control"
                    placeholder="Enter your name"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Rating

                </label>

                <select
                    class="form-select"
                    name="rating"
                    required>

                    <option value="">Select Rating</option>

                    <option>⭐⭐⭐⭐⭐ Excellent</option>

                    <option>⭐⭐⭐⭐ Good</option>

                    <option>⭐⭐⭐ Average</option>

                    <option>⭐⭐ Poor</option>

                    <option>⭐ Very Poor</option>

                </select>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Your Feedback

                </label>

                <textarea
                    class="form-control"
                    rows="5"
                    name="feedback"
                    placeholder="Write your feedback here..."
                    required></textarea>

            </div>

            <button
                class="btn btn-primary">

                <i class="fa-solid fa-paper-plane"></i>

                Submit Feedback

            </button>

        </form>

    </div>

</div>

</body>

</html>
